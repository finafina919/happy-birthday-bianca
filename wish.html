<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💌 留下你的生日祝福</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{height:100%}
  body{
    font-family:'Noto Sans TC',sans-serif;min-height:100%;
    background:linear-gradient(135deg,#fce4ec 0%,#f8bbd0 30%,#e1bee7 60%,#f3e5f5 100%);
    display:flex;flex-direction:column;align-items:center;
    padding:24px 16px env(safe-area-inset-bottom,24px);
  }

  .page-header{text-align:center;margin-bottom:24px;animation:fadeInUp .6s ease both}
  .page-header h1{font-family:'Dancing Script',cursive;font-size:clamp(28px,7vw,40px);color:#880e4f;margin-bottom:6px}
  .page-header p{font-size:clamp(13px,3.5vw,16px);color:#ad1457;opacity:.8}

  .card{
    width:100%;max-width:420px;
    background:rgba(255,255,255,.8);backdrop-filter:blur(12px);
    border-radius:20px;padding:24px 20px;
    box-shadow:0 8px 40px rgba(136,14,79,.12);
    animation:fadeInUp .6s ease .2s both;
    text-align:center;
  }
  .card p{font-size:15px;color:#4a1a3a;line-height:1.7;margin-bottom:20px}
  .card .emoji-big{font-size:48px;margin-bottom:16px;display:block}

  .btn{
    display:inline-block;padding:14px 32px;
    background:linear-gradient(135deg,#f48fb1,#ce93d8);
    color:#fff;border:none;border-radius:14px;
    font-family:'Noto Sans TC',sans-serif;
    font-size:16px;font-weight:600;text-decoration:none;
    cursor:pointer;box-shadow:0 4px 20px rgba(244,143,177,.4);
    transition:transform .2s ease;
  }
  .btn:active{transform:scale(.97)}

  /* Google Form embed */
  .form-embed{
    width:100%;max-width:420px;margin-top:20px;
    border-radius:20px;overflow:hidden;
    box-shadow:0 8px 40px rgba(136,14,79,.12);
    animation:fadeInUp .6s ease .3s both;
    background:#fff;
  }
  .form-embed iframe{width:100%;border:none;min-height:500px}

  /* Existing wishes */
  .existing-wishes{
    width:100%;max-width:420px;margin-top:28px;
    animation:fadeInUp .6s ease .4s both;
  }
  .existing-wishes h2{
    font-family:'Dancing Script',cursive;
    font-size:clamp(20px,5vw,26px);
    color:#880e4f;text-align:center;margin-bottom:14px;
  }
  .wishes-list{display:flex;flex-direction:column;gap:10px}
  .wish-card{
    background:rgba(255,255,255,.75);backdrop-filter:blur(8px);
    border-radius:14px;padding:14px 16px;
    box-shadow:0 2px 12px rgba(136,14,79,.08);
    animation:fadeInUp .5s ease both;
  }
  .wish-card .wish-from{font-size:12px;color:#ad1457;font-weight:600;margin-bottom:4px}
  .wish-card .wish-msg{font-size:14px;color:#4a1a3a;line-height:1.6}

  .back-link{margin-top:24px;margin-bottom:16px;text-align:center}
  .back-link a{color:#880e4f;font-size:14px;text-decoration:none;padding:10px 20px;border-radius:30px;background:rgba(255,255,255,.6);transition:background .3s ease}
  .back-link a:hover{background:rgba(255,255,255,.9)}

  .particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:-1}
  .particle{position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:.4}

  .setup-hint{
    width:100%;max-width:420px;margin-top:20px;
    background:rgba(255,255,255,.6);border-radius:16px;padding:20px;
    font-size:13px;color:#880e4f;line-height:1.8;
    animation:fadeInUp .6s ease .5s both;
  }
  .setup-hint h3{font-size:15px;margin-bottom:8px}
  .setup-hint code{background:rgba(136,14,79,.08);padding:2px 6px;border-radius:4px;font-size:12px}

  @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.4}90%{opacity:.2}100%{transform:translateY(-20vh) scale(1);opacity:0}}
</style>
</head>
<body>

<div class="particles" id="bgParticles"></div>

<div class="page-header">
  <h1>💌 給蔡的生日祝福</h1>
  <p>寫下你想對 Bianca 說的話吧！</p>
</div>

<!-- 如果有設定 Google Form，會顯示嵌入表單 -->
<!-- 如果沒有，顯示引導提示 -->
<div id="formArea"></div>

<div class="existing-wishes">
  <h2>✨ 已收到的祝福 ✨</h2>
  <div class="wishes-list" id="wishesList"></div>
</div>

<div class="back-link">
  <a href="index.html">🎂 前往生日驚喜頁面 →</a>
</div>

<script>
/* ====== CONFIG — 跟 index.html 一樣，填入你的資料 ====== */
const GOOGLE_SHEET_ID = '1Hec75nbBqDSa1QEy_Mbery0WFsSYwlS1h5LVZsYHBvs';
const GOOGLE_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLScFmNJVlmQS7TXWzCUE3sJEV8spRhXldA-zXBMY9Zz-3Zfqug/viewform';

const PRE_WISHES = [
  {
    from: '小宥',
    message: '蔡，認識你十年了欸，我們從小一認識起到現在，覺得時間過好快。看著你跟你哥一起在台北打拼，每次都不忘回羅東陪媽媽（還是是耍廢），真的覺得你很了不起。最近你換了新工作，真的替你開心，你值得所有好的事情。謝謝你一直都在，不管多忙都還是那個願意陪我玩、聽我講廢話的蔡。新的一歲，希望你工作順利、跟還有你哥、媽媽都健健康康的，然後我們繼續一起吃吃喝喝走下去。生日快樂，我很珍惜你哦。生快！'
  },
];

/* ====== PARTICLES ====== */
(function(){
  const el=document.getElementById('bgParticles');
  const colors=['#f48fb1','#ce93d8','#fff','#f8bbd0','#e1bee7'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div');p.className='particle';
    const s=Math.random()*7+3;
    Object.assign(p.style,{width:s+'px',height:s+'px',left:Math.random()*100+'%',
      background:colors[Math.random()*colors.length|0],
      animationDuration:(Math.random()*8+6)+'s',animationDelay:(Math.random()*5)+'s'});
    el.appendChild(p);
  }
})();

/* ====== FORM AREA ====== */
const formArea = document.getElementById('formArea');

if (GOOGLE_FORM_URL) {
  // Extract the form ID to create embed URL
  let embedUrl = GOOGLE_FORM_URL;
  if (embedUrl.includes('/viewform')) {
    embedUrl = embedUrl.replace('/viewform', '/viewform?embedded=true');
  } else if (!embedUrl.includes('embedded')) {
    embedUrl += (embedUrl.includes('?') ? '&' : '?') + 'embedded=true';
  }

  formArea.innerHTML = `
    <div class="form-embed">
      <iframe src="${embedUrl}" frameborder="0" marginheight="0" marginwidth="0"
        scrolling="auto" title="生日祝福表單">載入中...</iframe>
    </div>
  `;
} else {
  formArea.innerHTML = `
    <div class="card">
      <span class="emoji-big">📝</span>
      <p>留言功能設定中～<br>請等主辦人設定好 Google 表單後再來！</p>
    </div>
    <div class="setup-hint">
      <h3>🔧 主辦人設定指南：</h3>
      1. 到 <a href="https://forms.google.com" target="_blank">Google Forms</a> 新增表單<br>
      2. 加兩個欄位：<code>你的名字</code> 和 <code>想對蔡說的話</code><br>
      3. 複製表單網址，貼到 <code>wish.html</code> 和 <code>index.html</code> 最上方的 <code>GOOGLE_FORM_URL</code><br>
      4. 在表單的「回覆」分頁 → 連結 Google 試算表<br>
      5. 試算表 → 檔案 → 共用 → 發佈到網路 → 發佈<br>
      6. 複製試算表網址中的 ID，貼到 <code>GOOGLE_SHEET_ID</code>
    </div>
  `;
}

/* ====== SHOW EXISTING WISHES ====== */
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

async function loadWishes() {
  const list = document.getElementById('wishesList');
  let allWishes = [...PRE_WISHES];

  if (GOOGLE_SHEET_ID) {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:json`;
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.match(/\{.*\}/s)[0]);
      if (json.table && json.table.rows) {
        json.table.rows.forEach(row => {
          const cells = row.c;
          if (cells && cells.length >= 3) {
            allWishes.push({
              from: cells[1] ? cells[1].v : '匿名',
              message: cells[2] ? cells[2].v : '',
              time: cells[0] ? cells[0].f || cells[0].v : ''
            });
          }
        });
      }
    } catch(e) {
      console.log('Sheet load failed:', e);
    }
  }

  list.innerHTML = '';
  if (allWishes.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#ad1457;padding:20px;opacity:.7">還沒有祝福 — 你來當第一個吧！✨</div>';
    return;
  }

  allWishes.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'wish-card';
    card.style.animationDelay = (i * 0.08) + 's';
    card.innerHTML = `
      <div class="wish-from">💌 來自 ${escHtml(w.from)}</div>
      <div class="wish-msg">${escHtml(w.message)}</div>
      ${w.time ? '<div style="font-size:11px;color:#ce93d8;margin-top:6px;text-align:right">' + escHtml(w.time) + '</div>' : ''}
    `;
    list.appendChild(card);
  });
}

loadWishes();
</script>
</body>
</html>
